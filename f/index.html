<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İzlenenler</title>
<style>
  body, td, th {
    font-family: "Trebuchet MS", sans-serif;
    font-size: 12px;
    color: #494949;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  small {
    font-family: Verdana, sans-serif;
    font-size: 10px;
    color: #999999;
    padding-left: 15px;
  }
  a, a:visited { text-decoration: none; color: #CC3300; }
  a:hover { color: #FFFFFF; background-color: #CC3300; }
  .style1 { color: #003399; }
  .yukleniyor { color: #999; font-style: italic; }
  .wrapper { width: 660px; margin: 0 auto; }
</style>
</head>
<body>
<div class="wrapper">

  <h1>İzlenenler</h1>
  <p id="guncelleme" style="font-size:10px; color:#999; margin:2px 0 0 0;"></p>
  <hr>

  <table border="0" cellpadding="4" cellspacing="0">

    <tr>
      <td width="30"><strong>#</strong></td>
      <td width="580"><strong>Adı</strong></td>
    </tr>

    <tr>
      <td></td>
      <td><b><u>Yabancı Filmler</u></b></td>
    </tr>
    <tbody id="filmler-listesi">
      <tr><td colspan="2" class="yukleniyor">Yükleniyor...</td></tr>
    </tbody>

    <tr><td colspan="2"><br></td></tr>

    <tr>
      <td></td>
      <td><b><u>Diziler</u></b></td>
    </tr>
    <tbody id="diziler-listesi">
      <tr><td colspan="2" class="yukleniyor">Yükleniyor...</td></tr>
    </tbody>

    <tr><td colspan="2"><br></td></tr>

    <tr>
      <td></td>
      <td><b><u>Belgeseller</u></b></td>
    </tr>
    <tbody id="belgeseller-listesi">
      <tr><td colspan="2" class="yukleniyor">Yükleniyor...</td></tr>
    </tbody>

  </table>

  <hr style="border:dotted 1px #CCCCCC;">

</div>

<script>
  // !! Buraya kendi GitHub kullanıcı adın ve repo adını yaz !!
  const GITHUB_KULLANICI = "editorenaramu";
  const GITHUB_REPO      = "enaramu";

  // veri.json'un son commit tarihini GitHub API'den çek
  fetch(`https://api.github.com/repos/${GITHUB_KULLANICI}/${GITHUB_REPO}/commits?path=veri.json&per_page=1`)
    .then(r => r.json())
    .then(data => {
      if (data && data[0]) {
        const tarih = new Date(data[0].commit.author.date);
        document.getElementById("guncelleme").textContent =
          "Son güncelleme: " + tarih.toLocaleDateString("tr-TR", {
            day: "numeric", month: "long", year: "numeric"
          });
      }
    })
    .catch(() => {}); // tarih çekilemezse sessizce geç

  function escHtml(str) {
    if (!str) return "";
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  fetch("veri.json?t=" + Date.now())
    .then(r => r.json())
    .then(veri => {

      const siraVer = (arr) => arr.slice().sort((a, b) =>
        a.adi.localeCompare(b.adi, "tr", {sensitivity: "base"}));

      // Filmler
      const filmlerEl = document.getElementById("filmler-listesi");
      filmlerEl.innerHTML = "";
      siraVer(veri.filmler || []).forEach((film, i) => {
        const tr = document.createElement("tr");
        tr.setAttribute("valign","top");
        tr.innerHTML = `
          <td align="right">${i+1}.</td>
          <td>
            <span class="style1">${escHtml(film.adi)}</span>
            ${film.yil ? `<small><em>${escHtml(film.yil)}</em></small>` : ""}
          </td>`;
        filmlerEl.appendChild(tr);
      });

      // Diziler
      const dizilerEl = document.getElementById("diziler-listesi");
      dizilerEl.innerHTML = "";
      siraVer(veri.diziler || []).forEach((dizi, i) => {
        const detay = [dizi.sezon, dizi.aciklama].filter(Boolean).join(" ");
        const tr = document.createElement("tr");
        tr.setAttribute("valign","top");
        tr.innerHTML = `
          <td align="right">${i+1}.</td>
          <td>
            <span class="style1">${escHtml(dizi.adi)}</span>
            ${detay ? `<small><em>${escHtml(detay)}</em></small>` : ""}
          </td>`;
        dizilerEl.appendChild(tr);
      });

      // Belgeseller
      const belgesellerEl = document.getElementById("belgeseller-listesi");
      belgesellerEl.innerHTML = "";
      siraVer(veri.belgeseller || []).forEach((b, i) => {
        const tr = document.createElement("tr");
        tr.setAttribute("valign","top");
        tr.innerHTML = `
          <td align="right">${i+1}.</td>
          <td>
            <span class="style1">${escHtml(b.adi)}</span>
            ${b.aciklama ? `<small><em>${escHtml(b.aciklama)}</em></small>` : ""}
          </td>`;
        belgesellerEl.appendChild(tr);
      });

    })
    .catch(() => {
      document.getElementById("filmler-listesi").innerHTML =
        '<tr><td colspan="2" style="color:red;">Veri yüklenemedi.</td></tr>';
    });
</script>

</body>
</html>
